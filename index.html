<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>alphafun</title>
  <meta
    name="description"
    content="Guess the word of the day. Each guess reveals where the word sits alphabetically."
  />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div id="container">
    <a href="./" class="title">alphafun</a>
    <span class="puzzleno"
      >puzzle #{{ puzzleNumber }} •
      <span id="nextgame"
        ><span class="nextgame">{{ timeUntilNextGame }} left</span></span
      ></span
    >

    <div class="instructions">
      <p>
        Guess the word of the day. Each guess reveals where the word sits
        alphabetically.
      </p>
    </div>

    <div class="controls">
      <div class="datepicker">
        <span class="playdate">{{ getShortDayString() }}</span>
        <a href="#" class="randomday" @click="randomDay">random day</a>
      </div>
    </div>

    <div class="board">
      <template v-if="puzzleAvailable">
        <p class="bracket-label after-label" v-if="afterGuesses.length">
          Today's word comes <em>after</em>
        </p>
        <ul class="guesslist after-guesses">
          <li
            v-for="(g, i) in afterGuesses"
            :key="'a-' + g"
            :class="{ nearest: i === afterGuesses.length - 1 }"
          >{{ g }}</li>
        </ul>

        <div id="guesser" v-if="!winTime && !gaveUpTime">
          <form
            name="guesser"
            autocomplete="off"
            autocorrect="off"
            @submit.prevent="makeGuess"
          >
            <input
              id="new-guess"
              v-model="guessValue"
              v-focus
              @input="setGuess"
              placeholder="Guess an English word"
              type="text"
              autocomplete="new-password"
              autocorrect="off"
            />
            <input id="submit-guess" type="submit" value="Guess" />
            <p class="error" v-if="guessError">{{ guessError }}</p>
          </form>
          <div class="guessmeta" v-if="guesses.length">
            <span class="guesscount">
              {{ guesses.length }}
              {{ guesses.length === 1 ? 'guess' : 'guesses' }}
            </span>
            <a href="#" class="giveup" @click="giveUp">give up</a>
          </div>
        </div>

        <div class="result win" v-else-if="winTime">
          <p class="reveal">{{ word }}</p>
          <p>
            You got it in {{ guesses.length }}
            {{ guesses.length === 1 ? 'guess' : 'guesses' }}<span
              v-if="getFormattedTime(winTime - startTime)"
            > &bull; {{ getFormattedTime(winTime - startTime) }}</span>.
          </p>
        </div>
        <div class="result gaveup" v-else>
          <p class="reveal">{{ word }}</p>
          <p>You gave up. That was the word.</p>
        </div>

        <p class="bracket-label before-label" v-if="beforeGuesses.length">
          Today's word comes <em>before</em>
        </p>
        <ul class="guesslist before-guesses">
          <li
            v-for="(g, i) in beforeGuesses"
            :key="'b-' + g"
            :class="{ nearest: i === 0 }"
          >{{ g }}</li>
        </ul>
      </template>

      <div class="no-puzzle" v-else>
        <p>No puzzle available for this date.</p>
        <p>
          Pick
          <a href="#" class="randomday" @click="randomDay">another day</a>
          to keep playing.
        </p>
      </div>
    </div>
  </div>
  <br />
  <script src="assets/vue.global.prod.js"></script>
  <script src="dictionary.js"></script>
  <script src="index.js"></script>
</body>
</html>
